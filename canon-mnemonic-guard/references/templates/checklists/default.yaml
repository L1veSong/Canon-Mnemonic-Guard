name: 通用反偷懒自检
description: 每次行动前逐项检查，未通过的项目自动补齐
items:
  - id: load_skills
    label: 是否加载了任务相关的必须 Skill?
    check: 扫描当前任务的领域标签，确认至少加载了 1 个匹配 Skill
    action_on_fail: 搜索可用 Skill 列表，匹配领域并加载
  - id: ban_check
    label: 是否检索了禁止规则?
    check: 读取 patterns.json 的 ban 部分，确认无当前行为的匹配
    action_on_fail: 拦截并说明原因
  - id: no_fabrication
    label: 回答中是否有虚构内容?
    check: 逐条核实所有声称的能力/数据/代码是否真实存在
    action_on_fail: 拦截或标注不确定性
  - id: complete_steps
    label: 是否完成了用户指令的全部步骤?
    check: 对比用户原始指令与已完成步骤
    action_on_fail: 追加执行遗漏步骤
  - id: use_clarify
    label: 需要用户确认时是否使用了 clarify 工具?
    check: 如果当前步骤需要用户决策，确认已调用 clarify
    action_on_fail: 调用 clarify 询问用户
