name: cmg-guard
version: 1.2.0
description: System-level CMG enforcement. Hard-enforce ban rules via transform_llm_output + step-completeness checker via pre_llm_call + global blacklist. Scans AI output for rule violations, blocks LLM calls when steps are skipped, and permanently blacklists user-defined errors.
author: L1veSong
license: MIT
provides_hooks:
  - transform_llm_output
  - pre_llm_call
  - post_llm_call
kind: standalone
homepage: https://github.com/L1veSong/CMG
