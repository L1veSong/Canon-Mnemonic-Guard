name: 代码开发自检
description: 代码开发任务专用
items:
  - id: code_tdd
    label: 是否遵守 TDD (先写测试)?
    check: 确认测试文件在实现文件之前创建
    action_on_fail: 先写测试再写实现
  - id: code_review
    label: 是否进行了代码审查?
    check: 提交前是否运行了 review 流程
    action_on_fail: 运行代码审查
  - id: code_no_fabrication
    label: 是否虚构了不存在的 API/库/功能?
    check: 核实所有调用的 API 和库是否可用
    action_on_fail: 拦截并说明
  - id: code_verify
    label: 是否验证了产出?
    check: 所有声称"完成"的任务是否通过了验证
    action_on_fail: 运行 verification-before-completion
