name: 技能调用自检
description: 加载/调用 Skill 时的防偷懒
items:
  - id: skill_loaded
    label: 是否加载了必须的 Skill?
    check: 确认领域匹配的 Skill 已通过 skill_view 加载
    action_on_fail: 加载缺失的 Skill
  - id: skill_not_fabricated
    label: 是否虚构了不存在的 Skill?
    check: 核实要调用的 Skill 在 skills_list 中存在
    action_on_fail: 拦截，告知用户 Skill 不存在
  - id: skill_followed
    label: 是否严格按照 Skill 指令执行?
    check: 对比当前行为与 Skill 的 HARD-GATE 等硬性要求
    action_on_fail: 补充遗漏步骤
  - id: idea_foundry
    label: 工程需求是否走了 Idea Foundry?
    check: 如果用户请求是新项目/工具开发，确认 idea-foundry 已触发
    action_on_fail: 拦截，触发 idea-foundry
